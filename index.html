<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17150F">
<title>Palimpsest</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-head">
  <div class="mark">
    <span class="mark-glyph">P</span>
    <h1>Palimpsest</h1>
  </div>
  <button id="theme-toggle" class="ghost-btn" aria-label="Toggle light and dark ink">
    <span id="theme-toggle-label">dark</span>
  </button>
</header>

<p class="tagline">Notes that come back to be rewritten, not just reread.</p>

<main>

  <section class="compose" aria-label="Write a new note">
    <textarea id="composer" placeholder="Set something down…" rows="3"></textarea>
    <div class="compose-row">
      <input id="tag-input" type="text" placeholder="tags, comma, separated">
      <label class="photo-btn" for="photo-input">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 7h3l1.5-2h7L17 7h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="13" r="3.4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="photo-label">add photo</span>
      </label>
      <input id="photo-input" type="file" accept="image/*" hidden>
      <button id="save-btn" class="ink-btn">Set down</button>
    </div>
    <div id="photo-preview" class="photo-preview" hidden>
      <img id="photo-preview-img" alt="Attached photo preview">
      <button id="photo-clear" class="ghost-btn small" type="button">remove</button>
    </div>
  </section>

  <section class="resurfaced-zone" aria-label="Notes returning to you">
    <div class="zone-head">
      <h2>Returning to you</h2>
      <button id="resurface-btn" class="ghost-btn">resurface another pair</button>
    </div>
    <div id="resurfaced-list" class="note-list"></div>
    <p id="resurfaced-empty" class="empty-note" hidden>Nothing due back yet. New notes wait ten minutes before they can return.</p>
  </section>

  <section class="archive-zone" aria-label="Full archive">
    <div class="zone-head">
      <h2>Archive</h2>
      <button id="export-btn" class="ghost-btn">export json</button>
    </div>
    <div id="archive-list" class="note-list"></div>
    <p id="archive-empty" class="empty-note" hidden>The page is blank. Set something down above.</p>
  </section>

</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
