<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palimpsest</title>
    <style>
        :root {
            --bg-body: #0a0e14;
            --bg-card: #111a27;
            --border-color: #212f42;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444; /* Added danger color for deleting */
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --resurface-bg: rgba(59, 130, 246, 0.08);
            --resurface-border: #3b82f6;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --feed-width: 600px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-stack);
            line-height: 1.5;
            display: flex;
            justify-content: center;
        }

        main {
            width: 100%;
            max-width: var(--feed-width);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky; top: 0;
            background: rgba(10, 14, 20, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        header h1 { font-size: 1.3rem; font-weight: 800; color: var(--accent); cursor: pointer; transition: opacity 0.2s; }

        /* Smooth Expanding Search Layout */
        .search-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            flex-grow: 1;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        #search-input {
            width: 0px;
            padding: 0;
            opacity: 0;
            background-color: #1a2737;
            border: 1px solid transparent;
            color: var(--text-main);
            border-radius: 999px;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        /* Active Search input rules */
        #search-input.expanded {
            width: 100%;
            max-width: 220px;
            padding: 0.4rem 1rem;
            opacity: 1;
            border-color: var(--border-color);
        }

        .header-btn {
            background: none; border: 1px solid transparent; color: var(--text-muted);
            padding: 0.5rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .header-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .header-btn.active { color: var(--accent); }

        /* Navigation Views */
        .scrollable-view { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        #archive-vault-view { display: none; padding: 1.25rem; }

        /* Generative Module Styling */
        .resurfaced-container {
            background: var(--resurface-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
            position: relative;
        }
        .resurfaced-badge {
            background: var(--accent); color: white; font-size: 0.65rem; font-weight: 800;
            padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
            display: inline-block; margin-bottom: 0.75rem;
        }

        /* Feed Post Layout cards */
        .post-card {
            padding: 1.25rem; border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 0.6rem; position: relative;
        }
        .post-card:hover { background-color: rgba(255, 255, 255, 0.01); }
        .post-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); padding-right: 50px; } /* Space for buttons */
        .username { font-weight: 700; color: var(--accent); }
        .post-text { font-size: 0.95rem; white-space: pre-wrap; color: var(--text-main); }
        .post-tag { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; }
        
        .post-image-container { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); margin-top: 0.4rem; max-height: 350px; }
        .post-image { width: 100%; height: auto; display: block; object-fit: cover; }

        /* Action buttons in post header */
        .post-actions {
            position: absolute; top: 1.25rem; right: 1.25rem;
            display: flex; gap: 0.25rem; align-items: center;
        }
        .post-action-btn {
            background: none; border: none; cursor: pointer; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px;
        }
        .post-action-btn:hover { background: rgba(255,255,255,0.05); }
        .post-action-btn.edit:hover { color: var(--accent); }
        .post-action-btn.delete:hover { color: var(--danger); }

        /* Separate Archive Grid Display */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
        .archive-thumb {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 0.85rem; height: 120px; display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; transition: all 0.2s;
        }
        .archive-thumb:hover { transform: translateY(-2px); border-color: var(--accent); }
        .thumb-text { font-size: 0.85rem; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .thumb-tag { font-size: 0.75rem; color: var(--accent); font-weight: 700; }

        /* Action Buttons */
        .fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; background-color: var(--accent);
            border: none; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: transform 0.2s;
        }
        .fab:hover { transform: scale(1.05); background-color: var(--accent-hover); }
        .fab-icon { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 3; }

        /* Modern Slate Writing Overlay Sheet */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: flex-start; padding-top: 8vh; opacity: 0; pointer-events: none; z-index: 200;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 520px; border-radius: 14px; border: 1px solid var(--border-color); overflow: hidden; }
        .modal-header { padding: 1.25rem; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        
        .post-textarea {
            width: 100%; height: 140px; background: transparent; color: var(--text-main);
            border: none; padding: 1.25rem; font-family: var(--font-stack); font-size: 1rem; resize: none; outline: none;
        }

        #preview-container { padding: 0 1.25rem 1rem; display: none; }
        #preview-img { max-width: 100px; max-height: 100px; border-radius: 8px; border: 1px solid var(--border-color); object-fit: cover; }

        .input-row { padding: 0 1.25rem 1.25rem; display: flex; gap: 0.75rem; align-items: center; }
        .tag-input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 999px; color: var(--text-main); padding: 0.5rem 1.25rem; outline: none; font-size: 0.9rem; }
        #photo-input { display: none; }
        .photo-btn { background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 0.5rem 1.25rem; border-radius: 999px; cursor: pointer; font-size: 0.85rem; }
        .photo-btn:hover { border-color: var(--text-main); color: var(--text-main); }

        .submit-container { display: flex; justify-content: flex-end; padding: 0.85rem 1.25rem; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.1); }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 999px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <main>
        <header>
            <h1 id="brand-logo">Palimpsest</h1>
            
            <div class="search-wrapper">
                <!-- Smooth Expanding Search Box -->
                <input type="search" id="search-input" placeholder="Search archive...">
                
                <!-- Search Toggle Trigger Button (Updated to sleeker icon) -->
                <button class="header-btn" id="search-toggle-btn" title="Toggle Search">
                    <svg style="width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>

                <!-- Separate Archive Dashboard Toggle Button -->
                <button class="header-btn" id="toggle-archive" title="Open Archive View">
                    <svg style="width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>
        </header>

        <!-- View 1: Main Chronological Feed + Generative Resurfacing Area -->
        <div id="main-feed-view" class="scrollable-view">
            <div id="generative-resurface-zone"></div>
            <div id="feed-container"></div>
        </div>

        <!-- View 2: Separate Dedicated Archive Vault Layout -->
        <div id="archive-vault-view" class="scrollable-view">
            <h3 style="margin-bottom: 1.25rem; font-size: 1.05rem; color: var(--text-muted); font-weight: 700;">THE ARCHIVE VAULT</h3>
            <div class="archive-grid" id="archive-grid-container"></div>
        </div>
    </main>

    <!-- Global Floating Action Button -->
    <button class="fab" id="toggle-writer" aria-label="Write new entry">
        <svg class="fab-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <!-- Composition Overlay Window Sheet -->
    <div class="modal-overlay" id="writer-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Draft New Thought</h3>
                <button type="button" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:700;" id="close-modal">Cancel</button>
            </div>
            <form id="post-form">
                <input type="hidden" id="entry-id">
                <textarea class="post-textarea" id="post-text" placeholder="What reflection is solidifying?" required></textarea>
                
                <!-- Live Embedded Image Local Preview Frame -->
                <div id="preview-container">
                    <img id="preview-img" src="" alt="Preview Window">
                </div>

                <div class="input-row">
                    <input type="text" class="tag-input" id="post-tag" placeholder="Optional #tag">
                    <button type="button" class="photo-btn" id="trigger-photo">Add Photo</button>
                    <input type="file" id="photo-input" accept="image/*">
                </div>
                <div class="submit-container">
                    <button type="submit" class="submit-btn">Commit</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- OFFLINE CORE STORAGE SYSTEM (IndexedDB) ---
        let db;
        const dbRequest = indexedDB.open('PalimpsestDB', 1);

        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('entries')) {
                db.createObjectStore('entries', { keyPath: 'id', autoIncrement: true });
            }
        };

        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            renderAllAppViews();
        };

        dbRequest.onerror = () => console.error("Database connection failed.");

        // --- INTERFACE CONFIGURATION & STATE MANAGERS ---
        const mainFeedView = document.getElementById('main-feed-view');
        const archiveVaultView = document.getElementById('archive-vault-view');
        const toggleArchiveBtn = document.getElementById('toggle-archive');
        const brandLogo = document.getElementById('brand-logo');
        
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchInput = document.getElementById('search-input');

        function toggleNavigationViews(target) {
            if (target === 'archive') {
                mainFeedView.style.display = 'none';
                archiveVaultView.style.display = 'flex';
                toggleArchiveBtn.classList.add('active');
                if (searchInput.classList.contains('expanded')) {
                    searchInput.classList.remove('expanded');
                    searchInput.value = "";
                    searchToggleBtn.classList.remove('active');
                }
                renderAllAppViews(); // Ensure archive is rendered correctly
            } else {
                mainFeedView.style.display = 'flex';
                archiveVaultView.style.display = 'none';
                toggleArchiveBtn.classList.remove('active');
                renderAllAppViews(); // Ensure feed is rendered correctly
            }
        }

        toggleArchiveBtn.addEventListener('click', () => {
            const isArchiveVisible = archiveVaultView.style.display === 'flex';
            toggleNavigationViews(isArchiveVisible ? 'feed' : 'archive');
        });
        brandLogo.addEventListener('click', () => toggleNavigationViews('feed'));

        // Non-crashing Search Toggle Button Logic
        searchToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (searchInput.classList.contains('expanded')) {
                searchInput.classList.remove('expanded');
                searchInput.value = "";
                searchToggleBtn.classList.remove('active');
                renderAllAppViews();
            } else {
                searchInput.classList.add('expanded');
                searchToggleBtn.classList.add('active');
                searchInput.focus();
            }
        });

        // Hide search input if clicking brand logo while archive view is active
        brandLogo.addEventListener('click', () => {
            if (archiveVaultView.style.display === 'flex') {
                searchInput.classList.remove('expanded');
                searchInput.value = "";
                searchToggleBtn.classList.remove('active');
                toggleNavigationViews('feed');
            }
        });

        // --- APPLICATION WORKFLOWS & DATA COMMITS ---
        const modal = document.getElementById('writer-modal');
        const form = document.getElementById('post-form');
        const feed = document.getElementById('feed-container');
        const archiveGrid = document.getElementById('archive-grid-container');
        const resurfaceZone = document.getElementById('generative-resurface-zone');
        
        const photoInput = document.getElementById('photo-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        let currentEncodedImage = "";

        // Open composition system
        document.getElementById('toggle-writer').addEventListener('click', () => {
            form.reset();
            document.getElementById('entry-id').value = "";
            document.getElementById('modal-title').textContent = "Draft New Thought";
            previewContainer.style.display = 'none';
            currentEncodedImage = "";
            modal.classList.add('active');
        });

        document.getElementById('close-modal').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        // Asset Attachment Controllers
        document.getElementById('trigger-photo').addEventListener('click', () => photoInput.click());
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentEncodedImage = event.target.result;
                    previewImg.src = currentEncodedImage;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Dynamic Commit/Overwrite routing
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const idVal = document.getElementById('entry-id').value;
            const textVal = document.getElementById('post-text').value;
            const tagVal = document.getElementById('post-tag').value;

            if (!textVal.trim()) {
                alert("Please enter a reflection.");
                return;
            }

            const tx = db.transaction('entries', 'readwrite');
            const store = tx.objectStore('entries');

            const item = {
                text: textVal,
                tag: tagVal,
                image: currentEncodedImage,
                timestamp: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            if (idVal) {
                item.id = Number(idVal);
                store.put(item);
            } else {
                store.add(item);
            }

            tx.oncomplete = () => {
                modal.classList.remove('active');
                form.reset();
                previewContainer.style.display = 'none';
                currentEncodedImage = "";
                renderAllAppViews(searchInput.value.toLowerCase()); // Re-render with current query
            };
        });

        // Comprehensive Render Pass
        function renderAllAppViews(searchQuery = "") {
            const currentViewIsArchive = archiveVaultView.style.display === 'flex';
            if (!currentViewIsArchive) {
                feed.innerHTML = "";
            } else {
                archiveGrid.innerHTML = "";
            }
            const databaseBuffer = [];

            const tx = db.transaction('entries', 'readonly');
            const store = tx.objectStore('entries');
            
            store.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    databaseBuffer.push(cursor.value);
                    cursor.continue();
                } else {
                    // Execute Generative Loop processing 
                    if (!searchQuery && !currentViewIsArchive) {
                        processGenerativeResurfacing(databaseBuffer);
                    } else if (!currentViewIsArchive) {
                        resurfaceZone.innerHTML = "";
                    }

                    databaseBuffer.forEach(data => {
                        // Apply query filters
                        if (searchQuery && !data.text.toLowerCase().includes(searchQuery) && !data.tag.toLowerCase().includes(searchQuery)) {
                            return;
                        }

                        if (!currentViewIsArchive) {
                            // Render Active Feed Stream Cards
                            const card = document.createElement('article');
                            card.className = 'post-card';
                            card.innerHTML = `
                                <div class="post-meta">
                                    <span class="username">thought_stream</span>
                                    <span>${data.timestamp}</span>
                                </div>
                                <p class="post-text">${data.text}</p>
                                ${data.tag ? `<span class="post-tag">${data.tag.startsWith('#') ? data.tag : '#' + data.tag}</span>` : ''}
                                ${data.image ? `<div class="post-image-container"><img src="${data.image}" class="post-image" alt="Attached Document"></div>` : ''}
                                <div class="post-actions">
                                    <button class="post-action-btn edit" onclick="openForOverwrite(${data.id})" title="Rewrite Layer">
                                        <svg style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                    </button>
                                    <button class="post-action-btn delete" onclick="deleteEntry(${data.id})" title="Delete Layer">
                                        <svg style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    </button>
                                </div>
                            `;
                            feed.appendChild(card);
                        } else {
                            // Render Separate Vault Archive Grid Thumbnails
                            const thumb = document.createElement('div');
                            thumb.className = 'archive-thumb';
                            thumb.innerHTML = `
                                <p class="thumb-text">${data.text}</p>
                                <span class="thumb-tag">${data.tag ? (data.tag.startsWith('#') ? data.tag : '#' + data.tag) : '#UNTAGGED'}</span>
                            `;
                            // Define onclick later to pass correct data.id
                            thumb.addEventListener('click', () => { toggleNavigationViews('feed'); openForOverwrite(data.id); });
                            archiveGrid.appendChild(thumb);
                        }
                    });
                }
            };
        }

        // --- HISTORICAL GENERATIVE LOGIC ---
        function processGenerativeResurfacing(entries) {
            resurfaceZone.innerHTML = "";
            if (entries.length === 0) return;

            // Seed algorithm picking elements across timeline steps
            const randomIndex = Math.floor(Math.random() * entries.length);
            const data = entries[randomIndex];

            const resurfacedBlock = document.createElement('div');
            resurfacedBlock.className = 'resurfaced-container';
            resurfacedBlock.innerHTML = `
                <span class="resurfaced-badge">Resurfaced Layer</span>
                <div class="post-meta" style="margin-bottom:0.5rem; padding-right:0;">
                    <span class="username" style="color:var(--text-main);">historical_reflection</span>
                    <span>${data.timestamp}</span>
                </div>
                <p class="post-text" style="font-style: italic; color: rgba(255,255,255,0.9);">${data.text}</p>
                ${data.tag ? `<span class="post-tag">${data.tag.startsWith('#') ? data.tag : '#' + data.tag}</span>` : ''}
                ${data.image ? `<div class="post-image-container" style="max-height:160px; margin-top:0.4rem;"><img src="${data.image}" class="post-image" alt="Resurfaced Graphic"></div>` : ''}
                <div class="post-actions" style="top:1.25rem;">
                    <button class="post-action-btn edit" style="color:var(--accent);" onclick="openForOverwrite(${data.id})" title="Rewrite Historical Data">
                        <svg style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button class="post-action-btn delete" onclick="deleteEntry(${data.id})" title="Delete Layer">
                        <svg style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
            `;
            resurfaceZone.appendChild(resurfacedBlock);
        }

        // Connect Pencil Icon directly to database instances
        window.openForOverwrite = function(id) {
            if (archiveVaultView.style.display === 'flex') {
                toggleNavigationViews('feed');
            }
            const tx = db.transaction('entries', 'readonly');
            const store = tx.objectStore('entries');
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                if (!data) return;
                document.getElementById('entry-id').value = data.id;
                document.getElementById('post-text').value = data.text;
                document.getElementById('post-tag').value = data.tag;
                document.getElementById('modal-title').textContent = "Overwrite Layer";
                
                if (data.image) {
                    currentEncodedImage = data.image;
                    previewImg.src = data.image;
                    previewContainer.style.display = 'block';
                } else {
                    currentEncodedImage = "";
                    previewContainer.style.display = 'none';
                }
                modal.classList.add('active');
                document.getElementById('main-feed-view').scrollTo(0,0);
            };
        };

        // --- DELETING OPTION ---
        window.deleteEntry = function(id) {
            if (confirm("Are you sure you want to delete this reflection? This action cannot be undone.")) {
                const tx = db.transaction('entries', 'readwrite');
                const store = tx.objectStore('entries');
                store.delete(id);
                tx.oncomplete = () => {
                    renderAllAppViews(searchInput.value.toLowerCase()); // Re-render with current query
                };
            }
        };

        // Hook Input listener directly to live execution
        searchInput.addEventListener('input', (e) => {
            renderAllAppViews(e.target.value.toLowerCase());
        });
    </script>
</body>
</html>
